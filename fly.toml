# Fly.io configuration for BHOI Arhiva.
#
# IMPORTANT: this app stores its database as a SQLite file on the volume,
# so it must run as a SINGLE machine (one volume). Deploy with --ha=false.
#
# One-time setup:
#   fly volumes create bhoi_data --size 1 --region ams   # match primary_region
#   fly deploy --ha=false
app = "bhoipractice"
primary_region = "ams"   # Amsterdam (where this app was created)

[build]

[env]
  DB_DRIVER      = "sqlite"
  DB_SQLITE_PATH = "/data/app.sqlite"
  UPLOAD_DIR     = "/data/uploads"

# Persistent storage for the SQLite database + uploaded files.
[[mounts]]
  source      = "bhoi_data"
  destination = "/data"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
