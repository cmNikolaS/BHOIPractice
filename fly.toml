# Fly.io configuration for BHOI Arhiva.
# Change `app` to a unique name (or let `fly launch` set it), then:
#   fly apps create <name>
#   fly volumes create bhoi_data --size 1 --region fra
#   fly deploy
app = "bhoi-arhiva"
primary_region = "fra"   # Frankfurt — close to BiH; change if you like

[build]

[env]
  DB_DRIVER      = "sqlite"
  DB_SQLITE_PATH = "/data/app.sqlite"
  UPLOAD_DIR     = "/data/uploads"

# Persistent storage for the SQLite database + uploaded files.
[[mounts]]
  source      = "bhoi_data"
  destination = "/data"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
